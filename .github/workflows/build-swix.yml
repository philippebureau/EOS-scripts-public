name: Build SWIX

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  publish-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/pinglldpip-builder:latest

  build-swix:
    runs-on: ubuntu-latest
    needs: publish-builder
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SWIX from builder image
        run: |
          id=$(docker create ghcr.io/${{ github.repository_owner }}/pinglldpip-builder:latest)
          mkdir -p dist
          docker cp "$id":/swix/. dist/
          docker rm "$id"

      - name: Get version from spec
        id: version
        run: |
          VERSION=$(grep '^Version:' 'Ping LLDP neighbor/pingLldpIP.spec' | awk '{print $2}')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Update README with current SWIX version
        run: |
          SWIX_NAME=$(basename dist/pingLldpIP-*.noarch.swix)
          TAG=${{ steps.version.outputs.tag }}
          # Update the release tag in the download URL
          sed -i "s|releases/download/v[^/]*/|releases/download/${TAG}/|g" README.md
          # Update all versioned SWIX filenames
          sed -i "s/pingLldpIP-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*-[0-9][0-9]*\.noarch\.swix/${SWIX_NAME}/g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update README to ${SWIX_NAME} [skip ci]"
          git push

      - name: Create tag if it doesn't exist
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Upload SWIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingLldpIP-swix
          path: dist/*.swix
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.swix
