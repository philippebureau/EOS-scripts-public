name: Build SWIX

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  publish-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/pinglldpip-builder:latest

  build-swix:
    runs-on: ubuntu-latest
    needs: publish-builder
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SWIX from builder image
        run: |
          id=$(docker create ghcr.io/${{ github.repository_owner }}/pinglldpip-builder:latest)
          mkdir -p dist
          docker cp "$id":/swix/. dist/
          docker rm "$id"

      - name: Upload SWIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingLldpIP-swix
          path: dist/*.swix
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.swix
